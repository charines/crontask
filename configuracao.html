<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11d473",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102219",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-md mx-auto min-h-screen flex flex-col bg-background-light dark:bg-background-dark shadow-2xl">
<!-- Top Navigation -->
<div class="flex items-center p-4 border-b border-primary/10">
<button class="p-2 -ml-2 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="text-lg font-bold ml-2">Configure Sequence</h1>
</div>
<div class="flex-1 overflow-y-auto pb-32">
<!-- Header Section -->
<div class="px-4 pt-6 pb-2">
<h2 class="text-2xl font-bold tracking-tight">New Activity</h2>
<p class="text-sm text-slate-500 dark:text-primary/60 mt-1">Design your custom flow</p>
</div>
<!-- Input Form -->
<div class="px-4 space-y-4 py-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Task Name</label>
<input class="w-full rounded-lg border-primary/20 bg-white dark:bg-primary/5 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4" maxlength="180" placeholder="e.g. Morning Stretch" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Duration (minutes)</label>
<div class="flex">
<input class="flex-1 rounded-l-lg border-primary/20 bg-white dark:bg-primary/5 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 border-r-0" placeholder="5" type="number"/>
<div class="flex items-center px-4 bg-primary/10 border border-l-0 border-primary/20 rounded-r-lg text-primary">
<span class="material-symbols-outlined">timer</span>
</div>
</div>
</div>
<button class="w-full bg-primary/20 hover:bg-primary/30 text-primary font-bold py-3 rounded-lg flex items-center justify-center gap-2 transition-all">
<span class="material-symbols-outlined">add</span>
<span>Add Task</span>
</button>
</div>
<!-- Task List Section -->
<div class="px-4 mt-6">
<div class="flex items-center justify-between mb-4">
<h3 class="font-bold text-lg">Current Sequence</h3>
<span class="text-xs bg-primary/20 text-primary px-2 py-1 rounded-full font-bold">3 Tasks</span>
</div>
<div class="space-y-3">
<!-- Task Item 1 -->
<div class="flex items-center gap-4 p-4 rounded-xl bg-white dark:bg-primary/5 border border-primary/10">
<div class="flex-shrink-0 w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold">1</div>
<div class="flex-1">
<h4 class="font-semibold text-sm">Deep Breathing</h4>
<p class="text-xs text-slate-500 dark:text-slate-400">3 minutes</p>
</div>
<button class="text-slate-400 hover:text-red-500">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
<!-- Task Item 2 -->
<div class="flex items-center gap-4 p-4 rounded-xl bg-white dark:bg-primary/5 border border-primary/10">
<div class="flex-shrink-0 w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold">2</div>
<div class="flex-1">
<h4 class="font-semibold text-sm">Hydration Break</h4>
<p class="text-xs text-slate-500 dark:text-slate-400">2 minutes</p>
</div>
<button class="text-slate-400 hover:text-red-500">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
<!-- Task Item 3 -->
<div class="flex items-center gap-4 p-4 rounded-xl bg-white dark:bg-primary/5 border border-primary/10">
<div class="flex-shrink-0 w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold">3</div>
<div class="flex-1">
<h4 class="font-semibold text-sm">Focused Reading</h4>
<p class="text-xs text-slate-500 dark:text-slate-400">15 minutes</p>
</div>
<button class="text-slate-400 hover:text-red-500">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
</div>
</div>
</div>
<!-- Sticky Footer for Start Action -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md p-4 bg-background-light dark:bg-background-dark border-t border-primary/10 pb-8">
<div class="flex items-center justify-between mb-3 px-1">
<span class="text-sm font-medium text-slate-500">Total Duration:</span>
<span class="text-sm font-bold text-primary">20 minutes</span>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-black py-4 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transform active:scale-95 transition-all text-lg uppercase tracking-wider">
<span class="material-symbols-outlined">play_arrow</span>
                Start Sequence
            </button>
</div>
</div>
</body></html>
